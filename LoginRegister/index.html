<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>


	<script src="https://www.gstatic.com/firebasejs/8.0.0/firebase-app.js"></script>
	<script src="https://www.gstatic.com/firebasejs/8.0.0/firebase-auth.js"></script>	
	<script src="https://www.gstatic.com/firebasejs/8.0.0/firebase-database.js"></script>	
	<script src="https://www.gstatic.com/firebasejs/8.0.0/firebase-storage.js"></script> 
	<!-- <script src="../shared_libraries/firebase_config.js"></script> -->

	<link href="https://fonts.googleapis.com/css?family=Open+Sans:600">
	<link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" >
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="./loginregister.css">
	<script src="loginregister.js"></script>

	<title>Login</title>
</head>
<body>
	<div class="container">
		<div class="row">
			 <div class="col-sm-offset-3 col-sm-6">
				<div id="logout">
					<button class="btn btn-primary" onclick="logout()">
						LOG OUT!
					</button>
				</div>
				 <div class="tile">
					 <div class="login show">
					 <img src="https://www.flaticon.com/svg/static/icons/svg/1720/1720132.svg" class="logo">
						 <form id="login">
							 <div class="form-group">
								 <input  name="email" type="email" class="form-control" placeholder="Email" required>
							 </div><!-- group -->
							 <div class="form-group">
								 <input name="password" type="password"  autocomplete="off" class="form-control" placeholder="Password" required>
							 </div><!-- group -->
							 <button type="submit" onclick="login()" class="btn btn-info btn-block">Login</button>
							 <div class="soc">
								 <a href="#" class="fa fa-facebook"></a>
								 <a href="#" class="fa fa-twitter"></a>
								 <a href="#" class="fa fa-linkedin"></a>
							 </div><!-- soc -->
						 </form>						 
						 <p id="errorMsgLogin"></p>
					 </div><!-- login -->
					 <div class="signup">
					 <img src="https://www.flaticon.com/svg/static/icons/svg/1720/1720132.svg" class="logo">
						 <form id="register">
							 <div class="form-group">
								 <input name="name" type="text" class="form-control" placeholder="Name" required>
							 </div><!-- group -->
							 <div class="form-group">
								 <input name="email" type="email" class="form-control" placeholder="Email" required>
							 </div><!-- group -->
							 <div class="form-group">
								 <input name="password" type="password" autocomplete="off" class="form-control" placeholder="Password" required>
								 <input name="password2" type="password" autocomplete="off" class="form-control" placeholder="Re-type Password" required>
							 </div><!-- group -->	
							 <p id="errorMsgRegister"></p>

							 <button type="submit" class="btn btn-warning btn-block signup-btn"><span>Sign up</span></button>
							 <div class="text-center"><a href="#">Forgot password?</a></div>
						 </form>
						 <p id="registerStatus"></p>
					 </div><!-- signup -->
					 <span class="btn btn-warning btn-signup">Signup</span>
					 <span class="btn btn-info btn-login hidden">Login</span>
				 </div><!-- tile -->
			 </div><!-- col-6 -->
		 </div><!-- row -->
	 </div><!-- container -->

		 <p id="vldmlrrmsg"></p>
		 <button type="submit" class="btn btn-primary btn-" onclick="signUpWithoutPassword()">Sign up without password!</button>
	 </div>

	 <div id="logout"><button class="btn btn-primary" onclick="logout()">LOG OUT!</button></div>
	 
	 
	 <div id="loginstatus">Dein Login status:
	 </div>
	 <p id="sign-in-status"></p>
	 <p id="sign-in"></p>
	 <pre id="account-details"></pre> -->
</body>
</html>
