		<link rel="stylesheet" href="index.css" />

	</head>

	<body>
		<main class="cv-page">
			<h1 class="signup-title">Create CV item</h1>
			<p>This CV Card item lets you create a job experience</p>

			<form action="index.html" id="cv-form">
				<label for="flatpickr">Choose date:</label>
				<input name="date" id="flatpickr" autocomplete="off" required />

				<label for="title">Job-Title:</label>
				<input name="title" type="text" id="job-title" required />

				<label for="description" id="cv__list__label">Description:</label>
				<span class="cv--description">
					<input type="text" id="description"  />
					<img class="svg--add-icon" src="add.svg" id="cv-svg">
				</span>
				<ul id="cv-job-skills-list"></ul>
				<!-- <div class="signup-form__checkbox">
					<input type="checkbox" id="agree-terms" required />
					<label for="agree-terms"
						>Agree to
						<a href="#">Terms &amp; Conditions</a>
					</label>
				</div> -->
				<button type="submit" class="button">Add CV item</button>
			</form>
		</main>

		<script src="index.js"></script>

	</body>
</html>
