<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="contactstyles.css" />
		<title>Document</title>
	</head>
	<body>
		<form
			target="_blank"
			action="https://formsubmit.co/el/dijota"
			method="POST"
		>
			<div class="contact-form-wrapper">
				<div class="contact-form">
					<div class="input-fields">
						<input
							type="text"
							name="name"
							class="input"
							placeholder="Name"
							required
						/>
						<input
							type="email"
							name="email"
							class="input"
							placeholder="Email Address"
							required
						/>
						<!-- <input type="text" class="input" placeholder="Phone" /> -->
						<input
							type="text"
							class="input"
							name="_subject"
							placeholder="Subject"
						/>
					</div>
					<div class="msg">
						<textarea
							name="message"
							required
							placeholder="Message"
						></textarea>
					</div>
				</div>
			</div>
			<button type="submit" class="btn">Send</button>
		</form>
	</body>
</html>
