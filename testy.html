<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.container {
			display: flex;
			justify-content: space-between;
		}

		.container::before {
			content: "";
		}
		.container::after {
			content:"";
		}
		.test {
			border: 1px solid black;
			background-color: green;
		}
	</style>

</head>
<body>
	<div class="container">
		<span class=" test item1">Item1</span>
		<span class=" test ">Item2</span>
		<span class=" test ">Item3</span>
		<span class=" test "> Item4</span>
		<span class=" test" >Item5</span>
	</div>
</body>
</html>
